<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep atmospheric background -->
    <radialGradient id="bg-glow-1" cx="22%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#e5b776" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#e5b776" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow-2" cx="82%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#86c3ff" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#86c3ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b12"/>
      <stop offset="100%" stop-color="#06070c"/>
    </linearGradient>
    <!-- Mark gradients -->
    <linearGradient id="mark-trail" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e5b776" stop-opacity="0"/>
      <stop offset="45%" stop-color="#e5b776" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f2cd96" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="mark-tip" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3d9"/>
      <stop offset="55%" stop-color="#f2cd96"/>
      <stop offset="100%" stop-color="#e5b776"/>
    </radialGradient>
    <!-- Headline gradient -->
    <linearGradient id="headline-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5efdf"/>
      <stop offset="100%" stop-color="#c9c4b6"/>
    </linearGradient>
    <!-- Subtle dot grid -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg-base)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-1)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-2)"/>

  <!-- Faint horizon line -->
  <line x1="0" y1="470" x2="1200" y2="470" stroke="#e5b776" stroke-width="1" opacity="0.08"/>

  <!-- Brand mark (large, top-left) -->
  <g transform="translate(78, 76)">
    <rect width="68" height="68" rx="16" fill="#070810" stroke="#e5b776" stroke-opacity="0.22" stroke-width="1"/>
    <g transform="translate(14, 14)">
      <!-- scaled from 40x40 viewbox to 40x40 -->
      <circle cx="20" cy="20" r="14" stroke="#e5b776" stroke-width="1" fill="none" opacity="0.22"/>
      <path d="M 6 20 A 14 14 0 0 1 30 10" stroke="url(#mark-trail)" stroke-width="2.1" fill="none" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="1.6" fill="#e5b776" opacity="0.6"/>
      <circle cx="30" cy="10" r="3" fill="url(#mark-tip)"/>
    </g>
  </g>

  <!-- Wordmark next to brand mark -->
  <text x="170" y="124" font-family="Instrument Sans, sans-serif" font-size="22" font-weight="500" fill="#f3ead2" letter-spacing="-0.3">Continuous</text>
  <text x="292" y="124" font-family="Instrument Serif, Georgia, serif" font-size="26" font-style="italic" fill="#e5b776">Advancement</text>

  <!-- Eyebrow -->
  <text x="78" y="252" font-family="Geist Mono, monospace" font-size="13" fill="#e5b776" opacity="0.85" letter-spacing="2">THE OPERATING SYSTEM FOR MISSION-DRIVEN EXECUTIVE DIRECTORS</text>

  <!-- Headline -->
  <text x="78" y="342" font-family="Instrument Serif, Georgia, serif" font-size="88" font-weight="400" fill="url(#headline-grad)" letter-spacing="-1.5">What if your work</text>
  <text x="78" y="430" font-family="Instrument Serif, Georgia, serif" font-size="88" font-weight="400" fill="url(#headline-grad)" letter-spacing="-1.5">remembered <tspan font-style="italic" fill="#e5b776">you back?</tspan></text>

  <!-- Sub-lede -->
  <text x="78" y="510" font-family="Instrument Sans, sans-serif" font-size="22" fill="#ccc3aa" letter-spacing="-0.3">A second brain for the leaders who hold everything.</text>

  <!-- Tag chips -->
  <g transform="translate(78, 548)">
    <rect x="0" y="0" width="170" height="34" rx="17" fill="#11131d" stroke="#e5b776" stroke-opacity="0.18" stroke-width="1"/>
    <text x="85" y="22" font-family="Geist Mono, monospace" font-size="11" fill="#c9c4b6" text-anchor="middle" letter-spacing="1.5">WA PILOT · MAY 2026</text>

    <rect x="184" y="0" width="140" height="34" rx="17" fill="#11131d" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="254" y="22" font-family="Geist Mono, monospace" font-size="11" fill="#c9c4b6" text-anchor="middle" letter-spacing="1.5">PRIVATE BETA</text>

    <rect x="340" y="0" width="180" height="34" rx="17" fill="#11131d" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="430" y="22" font-family="Geist Mono, monospace" font-size="11" fill="#c9c4b6" text-anchor="middle" letter-spacing="1.5">ANTHROPIC INSIDE</text>
  </g>

  <!-- URL bottom-right -->
  <text x="1122" y="586" font-family="Geist Mono, monospace" font-size="14" fill="#8a8a93" text-anchor="end" letter-spacing="0.5">continuousadvancement.com</text>

  <!-- Decorative orbital mark (large, faded, right side) -->
  <g transform="translate(850, 205)" opacity="0.7">
    <circle cx="160" cy="160" r="150" stroke="#e5b776" stroke-width="1" fill="none" opacity="0.12"/>
    <circle cx="160" cy="160" r="110" stroke="#e5b776" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="160" cy="160" r="70" stroke="#e5b776" stroke-width="1" fill="none" opacity="0.28"/>
    <path d="M 10 160 A 150 150 0 0 1 292 72" stroke="url(#mark-trail)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="160" cy="160" r="3.5" fill="#e5b776" opacity="0.5"/>
    <circle cx="292" cy="72" r="11" fill="url(#mark-tip)"/>
    <circle cx="292" cy="72" r="22" fill="#e5b776" opacity="0.18"/>
  </g>
</svg>
